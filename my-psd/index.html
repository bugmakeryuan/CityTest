<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P博士的发卡神器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-6 text-slate-800">

    <div class="w-full max-w-sm mt-8">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center">发货小助手 📦</h1>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-6 text-center">
            <p class="text-sm text-slate-500 mb-1">当前剩余卡密</p>
            <p class="text-4xl font-black text-emerald-600" id="count-display">0</p>
        </div>

        <button id="extract-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 active:scale-95 transition-all text-white font-bold py-5 rounded-2xl shadow-lg shadow-emerald-200 mb-6 text-lg flex items-center justify-center gap-2">
            <span>✨ 提取一个并复制</span>
        </button>

        <div id="toast" class="hidden bg-slate-800 text-white text-sm py-3 px-4 rounded-xl text-center mb-6 shadow-lg transition-opacity">
            ✅ 话术与卡密已复制，快去小红书粘贴吧！
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
            <p class="text-sm font-bold text-slate-700 mb-2">卡密仓库 (一行一个)</p>
            <textarea id="code-pool" rows="6" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400" placeholder="在此粘贴你的备用卡密..."></textarea>
            <button id="save-btn" class="w-full mt-3 bg-slate-800 text-white text-sm py-2.5 rounded-xl active:scale-95 transition-transform">保存到本地</button>
        </div>
    </div>

    <script>
        const codePool = document.getElementById('code-pool');
        const saveBtn = document.getElementById('save-btn');
        const extractBtn = document.getElementById('extract-btn');
        const countDisplay = document.getElementById('count-display');
        const toast = document.getElementById('toast');

        // 初始化加载本地保存的卡密
        function loadCodes() {
            const savedCodes = localStorage.getItem('p_doctor_codes') || '';
            codePool.value = savedCodes;
            updateCount();
        }

        // 更新数字显示
        function updateCount() {
            const codes = codePool.value.split('\n').filter(c => c.trim() !== '');
            countDisplay.textContent = codes.length;
            if(codes.length === 0) countDisplay.className = "text-4xl font-black text-red-500";
            else countDisplay.className = "text-4xl font-black text-emerald-600";
        }

        // 保存按钮
        saveBtn.addEventListener('click', () => {
            localStorage.setItem('p_doctor_codes', codePool.value);
            updateCount();
            alert('卡密保存成功！关闭网页也不会丢失。');
        });

        // 提取并复制核心逻辑
        extractBtn.addEventListener('click', async () => {
            let codes = codePool.value.split('\n').filter(c => c.trim() !== '');
            if (codes.length === 0) {
                alert('⚠️ 仓库里没有卡密啦，请先补充！');
                return;
            }

            // 取出第一个卡密
            const currentCode = codes.shift(); 
            
            // 组装话术（你可以自由修改这里的文字）
            const replyText = `感谢下单！这是您的专属测试入口👇\n网址：https://www.206288.xyz/city-personality-test/\n授权码：${currentCode}\n（复制网址到浏览器打开，填入授权码即可解锁）`;

            try {
                // 写入手机剪贴板
                await navigator.clipboard.writeText(replyText);
                
                // 更新仓库（删掉刚才用过的）
                const newPool = codes.join('\n');
                codePool.value = newPool;
                localStorage.setItem('p_doctor_codes', newPool);
                updateCount();

                // 显示成功提示
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 2000);

            } catch (err) {
                alert('复制失败，请确保在 Safari 或 Chrome 浏览器中操作');
            }
        });

        loadCodes();
    </script>
</body>
</html>
