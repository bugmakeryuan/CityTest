<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P博士的自我探索实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        /* 确保背景渐变充满整个屏幕 */
        .bg-custom-gradient {
            background: linear-gradient(135deg, #ecfdf5 0%, #f0fdfa 50%, #ffffff 100%);
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden bg-custom-gradient text-slate-800 flex flex-col selection:bg-emerald-200">
    
    <header class="w-full pt-12 md:pt-16 flex justify-center fade-in">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="w-20 h-20 md:w-24 md:h-24 drop-shadow-md transition-transform duration-500 hover:scale-105">
            <defs>
                <linearGradient id="emeraldTeal" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#10b981" /> <stop offset="100%" stop-color="#0d9488" /> </linearGradient>
            </defs>
            <circle cx="50" cy="50" r="44" fill="none" stroke="url(#emeraldTeal)" stroke-width="2" stroke-dasharray="4 6"/>
            <circle cx="50" cy="50" r="38" fill="none" stroke="#0d9488" stroke-width="1" opacity="0.4"/>
            <path d="M50 12 L58 50 L50 88 L42 50 Z" fill="url(#emeraldTeal)"/>
            <path d="M50 12 L58 50 L50 50 Z" fill="#0f766e" opacity="0.6"/>
            <path d="M12 50 L50 58 L88 50 L50 42 Z" fill="#34d399" opacity="0.8"/>
            <circle cx="50" cy="50" r="5" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
        </svg>
    </header>

    <main class="flex-1 flex flex-col justify-center items-center px-6 text-center z-10 w-full max-w-lg mx-auto">
        
        <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-700 to-teal-600 mb-4 tracking-tight">
            P博士的自我探索实验室
        </h1>
        
        <p class="text-slate-500 text-base md:text-lg mb-10 leading-relaxed px-4">
            用科学的量表工具，看见隐藏的天赋与人格。
        </p>

        <a href="/city-personality-test/" class="group relative inline-flex items-center justify-center w-full sm:w-auto px-8 py-4 font-bold text-white transition-all duration-200 bg-gradient-to-r from-emerald-500 to-teal-600 rounded-full shadow-lg shadow-emerald-200 hover:shadow-xl hover:-translate-y-1 hover:from-emerald-600 hover:to-teal-700 active:scale-95">
            <span class="mr-2 text-lg">👉</span>
            进入测试：城市人格诊断
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>

        <div class="mt-8 text-sm text-slate-400 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            更多专业心理测评即将上线
        </div>
    </main>

    <footer class="w-full pb-8 pt-4 flex flex-col items-center justify-center text-center">
        <p class="text-slate-400 text-xs">
            © 2026 人间清醒P博士. All rights reserved.
        </p>
    </footer>

</body>
</html>
