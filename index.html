<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P博士的自我探索实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-emerald-50 via-teal-50/50 to-white text-slate-800 selection:bg-emerald-200">
    
    <div class="max-w-3xl mx-auto px-6 py-16 md:py-24">
        
        <header class="text-center mb-16 fade-in">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-tr from-emerald-100 to-teal-100 text-emerald-600 mb-6 shadow-sm border border-emerald-50">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></svg>
            </div>
            <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-700 to-teal-600 mb-4 tracking-tight">
                P博士的自我探索实验室
            </h1>
            <p class="text-slate-500 text-base md:text-lg max-w-lg mx-auto leading-relaxed">
                用科学的量表与工具，帮你突破认知局限，看见隐藏的天赋与人格。
            </p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <a href="/city-personality-test/" class="group block bg-white rounded-3xl p-7 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 border border-emerald-100/50 relative overflow-hidden">
                <div class="absolute -right-8 -top-8 w-32 h-32 bg-gradient-to-br from-emerald-100 to-teal-50 rounded-full blur-2xl group-hover:bg-emerald-200 transition-colors opacity-70"></div>

                <div class="relative z-10">
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-emerald-50 to-teal-50 flex items-center justify-center mb-5 text-emerald-600 group-hover:scale-110 transition-transform duration-300 shadow-sm border border-emerald-100/50">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10v11a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-11"/><path d="M2 10l10-7 10 7"/><path d="M10 22v-8h4v8"/></svg>
                    </div>
                    <h2 class="text-xl font-bold text-slate-800 mb-3 group-hover:text-emerald-700 transition-colors">
                        测测你是哪种城市人格
                    </h2>
                    <p class="text-slate-500 text-sm leading-relaxed mb-8">
                        如果你是一座城市，你会是哪座？通过生活态度与价值观测量，遇见与你灵魂共振的城市图景。
                    </p>
                    <div class="flex items-center text-sm font-bold text-emerald-600 group-hover:text-emerald-700">
                        立即开始测试
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 ml-1.5 group-hover:translate-x-1 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </div>
                </div>
            </a>

            <div class="group block bg-slate-50/50 rounded-3xl p-7 border-2 border-dashed border-slate-200 relative overflow-hidden flex flex-col justify-center items-center text-center opacity-80 select-none">
                <div class="w-12 h-12 rounded-2xl bg-slate-100 flex items-center justify-center mb-4 text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M2 12h20"/></svg>
                </div>
                <h2 class="text-base font-semibold text-slate-500 mb-2">更多专属测试研发中</h2>
                <p class="text-slate-400 text-sm">深度天赋潜能 / 心理年龄测试<br>即将上线，敬请期待</p>
            </div>

        </div>

        <footer class="mt-24 text-center">
            <p class="text-slate-400 text-sm">
                © 2026 人间清醒P博士. All rights reserved.
            </p>
        </footer>
    </div>

</body>
</html>
